<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ATLA Subway Builder Maps - Ba Sing Se Debug Map</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    :root {
      --bg: #f4f1ea;
      --ink: #1c1b19;
      --accent: #be4a2f;
      --panel: #fffaf0;
    }
    html, body { margin: 0; height: 100%; background: radial-gradient(circle at 20% 10%, #fff2d6, var(--bg)); font-family: "IBM Plex Sans", "Segoe UI", sans-serif; color: var(--ink); }
    #map { position: absolute; inset: 0; }
    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      width: min(420px, calc(100% - 24px));
      background: color-mix(in srgb, var(--panel) 92%, transparent);
      border: 1px solid #d6c7a8;
      border-radius: 10px;
      padding: 10px 12px;
      box-shadow: 0 8px 18px rgb(0 0 0 / 0.12);
    }
    h1 { font-size: 16px; margin: 0 0 8px; letter-spacing: 0.2px; }
    p { margin: 0 0 8px; font-size: 13px; line-height: 1.4; }
    code { background: #efe7d8; padding: 1px 4px; border-radius: 4px; }
    #log { margin: 8px 0 0; max-height: 180px; overflow: auto; font-size: 12px; white-space: pre-wrap; }
    .warn { color: #8b1d1d; font-weight: 600; }
    .ok { color: #245d3a; }
  </style>
</head>
<body>
  <div id="map"></div>
  <section id="hud">
    <h1>ATLA Subway Builder Maps - Ba Sing Se Debug Viewer</h1>
    <p>Mode: <code id="mode"></code> | PMTiles: <code id="pmtilesPath"></code></p>
    <p id="rangeStatus">Checking byte-range support...</p>
    <pre id="log"></pre>
  </section>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/pmtiles@3.1.0/dist/pmtiles.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const mode = params.get("mode") || "prod";
    const base = `outputs/${mode}`;
    let pmtilesPath = `${base}/BSS.pmtiles`;

    const modeEl = document.getElementById("mode");
    const pmtilesEl = document.getElementById("pmtilesPath");
    const rangeStatusEl = document.getElementById("rangeStatus");
    const logEl = document.getElementById("log");
    modeEl.textContent = mode;
    pmtilesEl.textContent = pmtilesPath;

    function log(msg) {
      logEl.textContent += `[${new Date().toISOString()}] ${msg}\n`;
    }

    async function checkRangeSupport() {
      try {
        const res = await fetch(pmtilesPath, { headers: { Range: "bytes=0-15" } });
        if (res.status === 206) {
          rangeStatusEl.className = "ok";
          rangeStatusEl.textContent = "Byte-range requests are working (HTTP 206).";
          log("Range probe passed.");
        } else {
          rangeStatusEl.className = "warn";
          rangeStatusEl.textContent = `Expected HTTP 206, got ${res.status}. Use make serve.`;
          log(`Range probe failed with status ${res.status}.`);
        }
      } catch (err) {
        rangeStatusEl.className = "warn";
        rangeStatusEl.textContent = "Range probe failed. Use make serve and check output artifacts.";
        log(`Range probe error: ${err}`);
      }
    }

    async function main() {
      await checkRangeSupport();

      let initialCenter = [113.24, 39.91];
      let initialZoom = 10.8;
      try {
        const cfgResp = await fetch(`${base}/config.json`);
        if (cfgResp.ok) {
          const cfg = await cfgResp.json();
          if (cfg.initialViewState) {
            initialCenter = [cfg.initialViewState.longitude, cfg.initialViewState.latitude];
            initialZoom = cfg.initialViewState.zoom;
          }
          if (cfg.code) {
            pmtilesPath = `${base}/${cfg.code}.pmtiles`;
            pmtilesEl.textContent = pmtilesPath;
          }
        }
      } catch (err) {
        log(`Could not load config view state: ${err}`);
      }

      const protocol = new pmtiles.Protocol();
      maplibregl.addProtocol("pmtiles", protocol.tile);

      const map = new maplibregl.Map({
        container: "map",
        style: {
          version: 8,
          glyphs: "https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf",
          sources: {
            basemap: {
              type: "vector",
              url: `pmtiles://${location.origin}/${pmtilesPath}`,
            },
            roadsRaw: {
              type: "geojson",
              data: `${base}/roads.geojson`,
            },
            runwaysRaw: {
              type: "geojson",
              data: `${base}/runways_taxiways.geojson`,
            },
            waterRaw: {
              type: "geojson",
              data: `${base}/water.geojson`,
            },
            openSpaceRaw: {
              type: "geojson",
              data: `${base}/open_space.geojson`,
            },
            campusesRaw: {
              type: "geojson",
              data: `${base}/campuses.geojson`,
            },
          },
          layers: [
            { id: "bg", type: "background", paint: { "background-color": "#f7f3ea" } },
            { id: "water", type: "fill", source: "basemap", "source-layer": "water", paint: { "fill-color": "#78b8d6", "fill-opacity": 0.7 } },
            { id: "open-space", type: "fill", source: "basemap", "source-layer": "open_space", paint: { "fill-color": "#94b87a", "fill-opacity": 0.45 } },
            { id: "campuses", type: "fill", source: "basemap", "source-layer": "campuses", paint: { "fill-color": "#b89dd6", "fill-opacity": 0.35 } },
            { id: "runways", type: "fill", source: "basemap", "source-layer": "runways", paint: { "fill-color": "#8f8f8f", "fill-opacity": 0.5 } },
            { id: "buildings-gen", type: "fill", source: "basemap", "source-layer": "buildings", paint: { "fill-color": "#c8653d", "fill-opacity": 0.45 }, maxzoom: 13 },
            { id: "buildings-detail", type: "fill", source: "basemap", "source-layer": "buildings_detail", paint: { "fill-color": "#c8653d", "fill-opacity": 0.55 }, minzoom: 12 },
            { id: "roads-major", type: "line", source: "basemap", "source-layer": "roads", paint: { "line-color": "#23201d", "line-width": ["interpolate", ["linear"], ["zoom"], 8, 1.5, 12, 3, 14, 5] } },
            { id: "roads-detail", type: "line", source: "basemap", "source-layer": "roads_detail", paint: { "line-color": "#4a4540", "line-width": ["interpolate", ["linear"], ["zoom"], 10, 0.5, 14, 2] }, minzoom: 10 },
            { id: "roads-raw", type: "line", source: "roadsRaw", paint: { "line-color": "#005f73", "line-width": 0.6, "line-opacity": 0.15 } },
            { id: "campuses-raw", type: "line", source: "campusesRaw", paint: { "line-color": "#6a4b8c", "line-width": 0.7, "line-opacity": 0.25 } },
          ],
        },
        center: initialCenter,
        zoom: initialZoom,
      });

      map.on("load", () => log("Map loaded successfully."));
      map.on("error", (e) => log(`Map error: ${JSON.stringify(e && e.error ? e.error.message : e)}`));
    }

    main().catch((err) => {
      log(`Fatal viewer error: ${err}`);
      rangeStatusEl.className = "warn";
    });
  </script>
</body>
</html>
